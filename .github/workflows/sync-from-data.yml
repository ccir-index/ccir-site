name: Sync today's snapshot from ccir-v2-data

on:
  schedule:
    # Quartet of UTC cron ticks. Action is idempotent (no-op if no diff vs. main),
    # so extra ticks are safe and give resilience against GitHub Actions schedule
    # lag — observed 2026-04-28: both the 10:30 and 11:30 UTC ticks were skipped
    # by GitHub, the 11:30 fired at 12:08 UTC instead. With four chances we cover
    # both DST halves of the year and survive an hour-plus of GH cron drift.
    # 10:30 UTC = 05:30 CDT / 04:30 CST
    # 11:30 UTC = 06:30 CDT / 05:30 CST
    # 12:30 UTC = 07:30 CDT / 06:30 CST
    # 13:30 UTC = 08:30 CDT / 07:30 CST
    - cron: '30 10 * * *'
    - cron: '30 11 * * *'
    - cron: '30 12 * * *'
    - cron: '30 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-from-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve today's CT date and fetch snapshot
        id: fetch
        run: |
          set -euo pipefail
          DATE=$(TZ=America/Chicago date +%F)
          PREV=$(TZ=America/Chicago date -d "$DATE -1 day" +%F)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          BASE="https://raw.githubusercontent.com/ccir-index/ccir-v2-data/main/indices/snapshots/$DATE"
          PREV_BASE="https://raw.githubusercontent.com/ccir-index/ccir-v2-data/main/indices/snapshots/$PREV"
          mkdir -p .sync
          # Manifest is the gate. 404 on either run-of-the-day cron tick = pipeline
          # hasn't published yet (typical during the wrong-DST half of the year).
          status=$(curl -sS -o .sync/manifest.json -w "%{http_code}" "$BASE/manifest.json")
          if [ "$status" != "200" ]; then
            echo "no snapshot at $DATE yet (HTTP $status) — exiting cleanly"
            echo "have_snapshot=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl -fsSL -o .sync/rates_daily.csv "$BASE/rates_daily.csv"
          curl -fsSL -o .sync/rates_shadow.csv "$BASE/rates_shadow.csv"
          # Prior-day CSV powers the ticker's day-over-day arrows. Graceful
          # skip if the prior date isn't published (e.g. holidays, gaps).
          if curl -fsSL -o .sync/rates_daily_prev.csv "$PREV_BASE/rates_daily.csv"; then
            echo "fetched prior-day CSV ($PREV)"
          else
            echo "no prior-day CSV at $PREV — ticker will show flat arrows for today"
            : > .sync/rates_daily_prev.csv  # empty file — loader handles gracefully
          fi
          # Per-chip listings_history CSVs power the public /markets time-series
          # view. Graceful per-file skip — older snapshots predate this product
          # and won't have the files; the site falls back to "no data yet" UI.
          for chip in h100-sxm-80gb h200-sxm-141gb b200-sxm-180gb gb200-nvl-nvl a100-sxm-80gb a100-sxm-40gb; do
            fname="listings_history_${chip}.csv"
            if curl -fsSL -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /markets will show empty for this chip"
              : > ".sync/$fname"
            fi
          done
          echo "have_snapshot=true" >> "$GITHUB_OUTPUT"

      - name: Verify hashes against manifest
        if: steps.fetch.outputs.have_snapshot == 'true'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os, sys
          m = json.load(open('.sync/manifest.json'))
          # Skip files we don't bundle (term_structure) and any file we
          # gracefully failed to fetch (left as a 0-byte placeholder above).
          NOT_BUNDLED = {'term_structure.csv'}
          for fname, spec in m['files'].items():
              if fname in NOT_BUNDLED:
                  continue
              path = f'.sync/{fname}'
              if not os.path.exists(path) or os.path.getsize(path) == 0:
                  print(f'skip {fname} (not fetched)')
                  continue
              data = open(path, 'rb').read()
              got = hashlib.sha256(data).hexdigest()
              if got != spec['sha256']:
                  sys.exit(f'sha256 mismatch on {fname}: got {got} expected {spec["sha256"]}')
              if len(data) != spec['byte_size']:
                  sys.exit(f'byte_size mismatch on {fname}: got {len(data)} expected {spec["byte_size"]}')
              print(f'ok {fname} ({spec["byte_size"]} bytes)')
          PY

      - name: Stage CSVs and rewrite meta.json
        if: steps.fetch.outputs.have_snapshot == 'true'
        run: |
          set -euo pipefail
          cp .sync/rates_daily.csv      src/data/rates_daily.csv
          cp .sync/rates_shadow.csv     src/data/rates_shadow.csv
          cp .sync/rates_daily_prev.csv src/data/rates_daily_prev.csv
          # listings_history CSVs land in public/data so the /markets page
          # can fetch them client-side at runtime (they're too large to
          # bundle at build time — ~1-2 MB each).
          mkdir -p public/data
          for chip in h100-sxm-80gb h200-sxm-141gb b200-sxm-180gb gb200-nvl-nvl a100-sxm-80gb a100-sxm-40gb; do
            fname="listings_history_${chip}.csv"
            if [ -s ".sync/$fname" ]; then
              cp ".sync/$fname" "public/data/$fname"
              echo "staged public/data/$fname"
            else
              # Snapshot didn't include this chip — leave any previous
              # version of the file in place rather than blanking it.
              echo "no $fname in this snapshot; leaving public/data unchanged"
            fi
          done
          python3 - <<'PY'
          import json
          m = json.load(open('.sync/manifest.json'))
          pub = m['publication']
          meta = {
              'as_of_date': pub['as_of_date'],
              'published_at_ct': pub['published_at_ct'],
              'published_at_utc': pub['published_at_utc'],
              'run_id': m['run_id'],
              'methodology_version': m['methodology_version'],
              'independence_declaration': m['independence_declaration'],
              'contributing_today': m['panel']['contributing_today'],
              'listings_history': m.get('listings_history'),
          }
          with open('src/data/meta.json', 'w') as f:
              json.dump(meta, f, indent=2)
              f.write('\n')
          PY
          rm -rf .sync

      - name: Commit + push if changed
        if: steps.fetch.outputs.have_snapshot == 'true'
        env:
          DATE: ${{ steps.fetch.outputs.date }}
        run: |
          set -euo pipefail
          git config user.email "ccir-pipeline@ccir.io"
          git config user.name  "CCIR Pipeline"
          git add src/data/rates_daily.csv src/data/rates_shadow.csv src/data/rates_daily_prev.csv src/data/meta.json
          # public/data/listings_history_*.csv only exists once the upstream
          # pipeline starts emitting these files; -A on a missing dir is fine.
          if [ -d public/data ]; then
            git add -A public/data
          fi
          if git diff --cached --quiet; then
            echo "no changes to commit — site already at $DATE"
            exit 0
          fi
          git commit -m "data: refresh snapshot to $DATE"
          git push origin main

name: Sync today's snapshot from ccir-v2-data

on:
  schedule:
    # Failsafe ticks only — the primary path is push-triggered via
    # ccir-v2-data/.github/workflows/notify-site.yml, which fires
    # workflow_dispatch on this workflow whenever a snapshot manifest
    # changes upstream. These cron ticks exist so the site keeps catching
    # up if the notify chain ever breaks (PAT expired, GH outage on the
    # data repo, etc.).
    #
    # 2026-04-29: hourly cron was tried and proved unreliable — GH Actions
    # dropped 3 of 3 expected hourly ticks across a 3-hour window. Cron
    # alone is brute-force protection that GH Actions doesn't honor under
    # load, so we keep it minimal and rely on push-trigger for freshness.
    - cron: '30 11 * * *'  # mid-morning daily-fix publish window
    - cron: '30 17 * * *'  # mid-afternoon intraday catch-up
    - cron: '30 23 * * *'  # late-evening intraday catch-up
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-from-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve today's CT date and fetch snapshot
        id: fetch
        env:
          GH_PAT: ${{ secrets.CCIR_V2_DATA_READ_PAT }}
        run: |
          set -euo pipefail
          DATE=$(TZ=America/Chicago date +%F)
          PREV=$(TZ=America/Chicago date -d "$DATE -1 day" +%F)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          BASE="https://raw.githubusercontent.com/ccir-index/ccir-v2-data/main/indices/snapshots/$DATE"
          PREV_BASE="https://raw.githubusercontent.com/ccir-index/ccir-v2-data/main/indices/snapshots/$PREV"
          mkdir -p .sync
          # Manifest is the gate. 404 on either run-of-the-day cron tick = pipeline
          # hasn't published yet (typical during the wrong-DST half of the year).
          status=$(curl -sS -H "Authorization: token $GH_PAT" -o .sync/manifest.json -w "%{http_code}" "$BASE/manifest.json")
          if [ "$status" != "200" ]; then
            echo "no snapshot at $DATE yet (HTTP $status) — exiting cleanly"
            echo "have_snapshot=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          curl -fsSL -H "Authorization: token $GH_PAT" -o .sync/rates_daily.csv "$BASE/rates_daily.csv"
          curl -fsSL -H "Authorization: token $GH_PAT" -o .sync/rates_shadow.csv "$BASE/rates_shadow.csv"
          # Vast clearing-vs-list basis overlay (small; bundled into src/data).
          # Graceful: snapshots predating the overlay won't carry it.
          if curl -fsSL -H "Authorization: token $GH_PAT" -o .sync/vast_basis.csv "$BASE/vast_basis.csv"; then
            echo "fetched vast_basis.csv"
          else
            echo "no vast_basis.csv at $DATE — /basis keeps previous"
            : > .sync/vast_basis.csv
          fi
          # Within-provider committed MI (spread-to-spot + implied forwards)
          # powers the /term end-label % and forwards section. Graceful:
          # snapshots predating gold.committed_mi_daily won't carry it.
          if curl -fsSL -H "Authorization: token $GH_PAT" -o .sync/committed_mi.csv "$BASE/committed_mi.csv"; then
            echo "fetched committed_mi.csv"
          else
            echo "no committed_mi.csv at $DATE — /term keeps previous"
            : > .sync/committed_mi.csv
          fi
          # Prior-day CSV powers the ticker's day-over-day arrows. Graceful
          # skip if the prior date isn't published (e.g. holidays, gaps).
          if curl -fsSL -H "Authorization: token $GH_PAT" -o .sync/rates_daily_prev.csv "$PREV_BASE/rates_daily.csv"; then
            echo "fetched prior-day CSV ($PREV)"
          else
            echo "no prior-day CSV at $PREV — ticker will show flat arrows for today"
            : > .sync/rates_daily_prev.csv  # empty file — loader handles gracefully
          fi
          # Per-chip listings_history CSVs power the public /markets time-series
          # view. Graceful per-file skip — older snapshots predate this product
          # and won't have the files; the site falls back to "no data yet" UI.
          for chip in h100-sxm-80gb h200-sxm-141gb b200-sxm-180gb b300-sxm-288gb gb200-nvl-nvl gb300-nvl-nvl a100-sxm-80gb a100-sxm-40gb; do
            fname="listings_history_${chip}.csv"
            if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /markets will show empty for this chip"
              : > ".sync/$fname"
            fi
          done
          # Per-chip marketplace CSVs power the public /marketplace intraday
          # view. Same graceful per-file skip pattern.
          for chip in h100-sxm-80gb h200-sxm-141gb b200-sxm-180gb b300-sxm-288gb gb200-nvl-nvl gb300-nvl-nvl a100-sxm-80gb a100-sxm-40gb; do
            fname="marketplace_${chip}.csv"
            if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /marketplace will show empty for this chip"
              : > ".sync/$fname"
            fi
          done
          # Per-chip Vast CSVs power /vast — three files per chip (current-cycle
          # offers, 30d distribution-history, current-cycle geographic) plus one
          # cross-chip summary. Chip slugs derived from Vast gpu_name (spaces
          # → hyphens, lowercased): see ccir-v2-notebooks/export/export_vast.py.
          for chip in h100-sxm h200 b200 a100-sxm4 a100-pcie gb200 \
                      rtx-4090 rtx-5090 rtx-3090 l40 l40s rtx-6000ada rtx-a6000; do
            for prefix in vast_offers vast_distribution_history vast_geographic; do
              fname="${prefix}_${chip}.csv"
              if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
                echo "fetched $fname"
              else
                echo "no $fname at $DATE — /vast will show empty for this chip section"
                : > ".sync/$fname"
              fi
            done
          done
          # Cross-chip summary file
          if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/vast_summary.csv" "$BASE/vast_summary.csv"; then
            echo "fetched vast_summary.csv"
          else
            echo "no vast_summary.csv at $DATE — /vast hero will fall back"
            : > ".sync/vast_summary.csv"
          fi
          # Per-chip Shadeform CSVs power /availability — three files per chip
          # (current-cycle SKU x region offers, 30d availability-history,
          # current-cycle providers summary) plus one cross-chip summary. Chip
          # slugs derived from AVAILABILITY_ALL_CHIPS in
          # ccir-v2-notebooks/shared/config.py.
          for chip in h100-sxm h100-pcie h200-sxm b200-sxm gb200 \
                      a100-sxm-80gb a100-pcie-80gb \
                      b300 gh200 rtx-pro-6000 l40s; do
            for prefix in availability_offers shadeform_availability_history shadeform_providers; do
              fname="${prefix}_${chip}.csv"
              if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
                echo "fetched $fname"
              else
                echo "no $fname at $DATE — /availability will show empty for this chip section"
                : > ".sync/$fname"
              fi
            done
          done
          # Cross-chip Shadeform summary
          if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/shadeform_summary.csv" "$BASE/shadeform_summary.csv"; then
            echo "fetched shadeform_summary.csv"
          else
            echo "no shadeform_summary.csv at $DATE — /availability summary will fall back"
            : > ".sync/shadeform_summary.csv"
          fi
          # Utilization CSVs power /utilization (implied) + the /basis
          # occupancy section. IMU chip slugs (h100-sxm form), not silicon_id.
          for chip in h100-sxm h200-sxm b200-sxm b300 gb200 a100-sxm-80gb a100-sxm-40gb; do
            fname="utilization_implied_${chip}.csv"
            if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /utilization will show empty for this chip"
              : > ".sync/$fname"
            fi
          done
          for fname in utilization_sources.csv utilization_macro.csv; do
            if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /utilization tables will fall back"
              : > ".sync/$fname"
            fi
          done
          for chip in h100-sxm h200-sxm b200-sxm b300 gb200 a100-sxm-80gb a100-sxm-40gb; do
            fname="utilization_intraday_${chip}.csv"
            if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /utilization inventory chart will fall back"
              : > ".sync/$fname"
            fi
          done
          # Vast occupancy series (Vast variant grain + the all roll).
          for chip in h100-sxm h100-pcie h200-sxm b200-sxm gb200 a100-sxm all; do
            fname="vast_occupancy_${chip}.csv"
            if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /basis occupancy will show empty for this chip"
              : > ".sync/$fname"
            fi
          done
          # Availability Index (curated multi-source) — powers the new /utilization
          # page: per-chip headline + 90d trend, plus the cross-chip headline +
          # per-source panel. IMU chip slugs.
          for chip in h100-sxm h200-sxm b200-sxm b300 gb200 a100-sxm-80gb a100-sxm-40gb; do
            for prefix in availability_index availability_index_trend; do
              fname="${prefix}_${chip}.csv"
              if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
                echo "fetched $fname"
              else
                echo "no $fname at $DATE — /utilization availability will fall back"
                : > ".sync/$fname"
              fi
            done
          done
          for fname in availability_index_headline.csv availability_index_sources.csv vast_utilization.csv vast_utilization_weekly.csv; do
            if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /utilization will fall back"
              : > ".sync/$fname"
            fi
          done
          # Denominator-fixed Vast utilization trend (Vast chip slugs).
          for chip in h100-sxm h100-pcie h200-sxm b200-sxm gb200 a100-sxm; do
            fname="vast_utilization_trend_${chip}.csv"
            if curl -fsSL -H "Authorization: token $GH_PAT" -o ".sync/$fname" "$BASE/$fname"; then
              echo "fetched $fname"
            else
              echo "no $fname at $DATE — /utilization occupancy trend will fall back"
              : > ".sync/$fname"
            fi
          done
          echo "have_snapshot=true" >> "$GITHUB_OUTPUT"

      - name: Verify hashes against manifest
        if: steps.fetch.outputs.have_snapshot == 'true'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os, sys
          m = json.load(open('.sync/manifest.json'))
          # Skip files we don't bundle (term_structure) and any file we
          # gracefully failed to fetch (left as a 0-byte placeholder above).
          NOT_BUNDLED = {'term_structure.csv'}
          for fname, spec in m['files'].items():
              if fname in NOT_BUNDLED:
                  continue
              path = f'.sync/{fname}'
              if not os.path.exists(path) or os.path.getsize(path) == 0:
                  print(f'skip {fname} (not fetched)')
                  continue
              data = open(path, 'rb').read()
              got = hashlib.sha256(data).hexdigest()
              if got != spec['sha256']:
                  sys.exit(f'sha256 mismatch on {fname}: got {got} expected {spec["sha256"]}')
              if len(data) != spec['byte_size']:
                  sys.exit(f'byte_size mismatch on {fname}: got {len(data)} expected {spec["byte_size"]}')
              print(f'ok {fname} ({spec["byte_size"]} bytes)')
          PY

      - name: Stage CSVs and rewrite meta.json
        if: steps.fetch.outputs.have_snapshot == 'true'
        run: |
          set -euo pipefail
          cp .sync/rates_daily.csv      src/data/rates_daily.csv
          cp .sync/rates_shadow.csv     src/data/rates_shadow.csv
          cp .sync/rates_daily_prev.csv src/data/rates_daily_prev.csv
          # Overlay CSV — leave the previous copy in place if this snapshot lacked it.
          if [ -s .sync/vast_basis.csv ]; then
            cp .sync/vast_basis.csv src/data/vast_basis.csv
          fi
          # Within-provider committed MI — same leave-previous rule.
          if [ -s .sync/committed_mi.csv ]; then
            cp .sync/committed_mi.csv src/data/committed_mi.csv
          fi
          # listings_history CSVs land in public/data so the /markets page
          # can fetch them client-side at runtime (they're too large to
          # bundle at build time — ~1-2 MB each).
          mkdir -p public/data
          for chip in h100-sxm-80gb h200-sxm-141gb b200-sxm-180gb b300-sxm-288gb gb200-nvl-nvl gb300-nvl-nvl a100-sxm-80gb a100-sxm-40gb; do
            for prefix in listings_history marketplace; do
              fname="${prefix}_${chip}.csv"
              if [ -s ".sync/$fname" ]; then
                cp ".sync/$fname" "public/data/$fname"
                echo "staged public/data/$fname"
              else
                # Snapshot didn't include this file — leave any previous
                # version of the file in place rather than blanking it.
                echo "no $fname in this snapshot; leaving public/data unchanged"
              fi
            done
          done
          # Stage Vast CSVs (per-chip × 3 prefixes + summary).
          for chip in h100-sxm h200 b200 a100-sxm4 a100-pcie gb200 \
                      rtx-4090 rtx-5090 rtx-3090 l40 l40s rtx-6000ada rtx-a6000; do
            for prefix in vast_offers vast_distribution_history vast_geographic; do
              fname="${prefix}_${chip}.csv"
              if [ -s ".sync/$fname" ]; then
                cp ".sync/$fname" "public/data/$fname"
                echo "staged public/data/$fname"
              else
                echo "no $fname in this snapshot; leaving public/data unchanged"
              fi
            done
          done
          if [ -s ".sync/vast_summary.csv" ]; then
            cp ".sync/vast_summary.csv" "public/data/vast_summary.csv"
            echo "staged public/data/vast_summary.csv"
          fi
          # Stage Shadeform CSVs (per-chip x 3 prefixes + summary).
          for chip in h100-sxm h100-pcie h200-sxm b200-sxm gb200 \
                      a100-sxm-80gb a100-pcie-80gb \
                      b300 gh200 rtx-pro-6000 l40s; do
            for prefix in availability_offers shadeform_availability_history shadeform_providers; do
              fname="${prefix}_${chip}.csv"
              if [ -s ".sync/$fname" ]; then
                cp ".sync/$fname" "public/data/$fname"
                echo "staged public/data/$fname"
              else
                echo "no $fname in this snapshot; leaving public/data unchanged"
              fi
            done
          done
          if [ -s ".sync/shadeform_summary.csv" ]; then
            cp ".sync/shadeform_summary.csv" "public/data/shadeform_summary.csv"
            echo "staged public/data/shadeform_summary.csv"
          fi
          # Stage utilization CSVs (implied per chip + sources + macro + occupancy).
          for chip in h100-sxm h200-sxm b200-sxm b300 gb200 a100-sxm-80gb a100-sxm-40gb; do
            for prefix in utilization_implied utilization_intraday; do
              fname="${prefix}_${chip}.csv"
              if [ -s ".sync/$fname" ]; then
                cp ".sync/$fname" "public/data/$fname"
                echo "staged public/data/$fname"
              else
                echo "no $fname in this snapshot; leaving public/data unchanged"
              fi
            done
          done
          for fname in utilization_sources.csv utilization_macro.csv; do
            if [ -s ".sync/$fname" ]; then
              cp ".sync/$fname" "public/data/$fname"
              echo "staged public/data/$fname"
            fi
          done
          for chip in h100-sxm h100-pcie h200-sxm b200-sxm gb200 a100-sxm all; do
            fname="vast_occupancy_${chip}.csv"
            if [ -s ".sync/$fname" ]; then
              cp ".sync/$fname" "public/data/$fname"
              echo "staged public/data/$fname"
            else
              echo "no $fname in this snapshot; leaving public/data unchanged"
            fi
          done
          # Stage Availability Index + Vast utilization CSVs (the new /utilization).
          for chip in h100-sxm h200-sxm b200-sxm b300 gb200 a100-sxm-80gb a100-sxm-40gb; do
            for prefix in availability_index availability_index_trend; do
              fname="${prefix}_${chip}.csv"
              if [ -s ".sync/$fname" ]; then
                cp ".sync/$fname" "public/data/$fname"
                echo "staged public/data/$fname"
              else
                echo "no $fname in this snapshot; leaving public/data unchanged"
              fi
            done
          done
          for chip in h100-sxm h100-pcie h200-sxm b200-sxm gb200 a100-sxm; do
            fname="vast_utilization_trend_${chip}.csv"
            if [ -s ".sync/$fname" ]; then
              cp ".sync/$fname" "public/data/$fname"
              echo "staged public/data/$fname"
            else
              echo "no $fname in this snapshot; leaving public/data unchanged"
            fi
          done
          for fname in availability_index_headline.csv availability_index_sources.csv vast_utilization.csv vast_utilization_weekly.csv; do
            if [ -s ".sync/$fname" ]; then
              cp ".sync/$fname" "public/data/$fname"
              echo "staged public/data/$fname"
            fi
          done
          python3 - <<'PY'
          import json
          m = json.load(open('.sync/manifest.json'))
          pub = m['publication']
          meta = {
              'as_of_date': pub['as_of_date'],
              'published_at_ct': pub['published_at_ct'],
              'published_at_utc': pub['published_at_utc'],
              'run_id': m['run_id'],
              'methodology_version': m['methodology_version'],
              'independence_declaration': m['independence_declaration'],
              'contributing_today': m['panel']['contributing_today'],
              'listings_history': m.get('listings_history'),
              'marketplace_history': m.get('marketplace_history'),
              'vast': m.get('vast'),
              'availability': m.get('availability'),
              'utilization': m.get('utilization'),
          }
          with open('src/data/meta.json', 'w') as f:
              json.dump(meta, f, indent=2)
              f.write('\n')
          PY
          rm -rf .sync

      - name: Fetch + stage chart cards
        if: steps.fetch.outputs.have_snapshot == 'true'
        env:
          GH_PAT: ${{ secrets.CCIR_V2_DATA_READ_PAT }}
        run: |
          set -euo pipefail
          DATE="${{ steps.fetch.outputs.date }}"
          BASE="https://raw.githubusercontent.com/ccir-index/ccir-v2-data/main/indices/snapshots/$DATE"
          mkdir -p public/data
          # Chart-card PNGs are baked into the site (they were fetched client-side
          # from the data repo, which is now private). List + download every card
          # for today's snapshot into public/data so /utilization serves them locally.
          # `grep` exits 1 when a snapshot carries no card PNGs (e.g. a restate
          # regenerates the snapshot without them). Under `pipefail` that would
          # kill the whole sync — so tolerate an empty match here while still
          # letting a real `gh api` failure fail the step.
          GH_TOKEN="$GH_PAT" gh api "repos/ccir-index/ccir-v2-data/contents/indices/snapshots/$DATE" --jq '.[].name' \
            | { grep -E '^card_.*\.png$' || true; } | while read -r f; do
              if curl -fsSL -H "Authorization: token $GH_PAT" -o "public/data/$f" "$BASE/$f"; then
                echo "staged public/data/$f"
              fi
            done

      - name: Rebuild indices_history.csv (rolling N-day window)
        if: steps.fetch.outputs.have_snapshot == 'true'
        env:
          CCIR_HISTORY_TODAY: ${{ steps.fetch.outputs.date }}
          # ccir-v2-data is private; the rebuild fetches per-day snapshots over
          # raw.githubusercontent and needs the read PAT or it rebuilds empty.
          GH_PAT: ${{ secrets.CCIR_V2_DATA_READ_PAT }}
        run: |
          set -euo pipefail
          python3 scripts/build_indices_history.py

      - name: Commit + push if changed
        if: steps.fetch.outputs.have_snapshot == 'true'
        env:
          DATE: ${{ steps.fetch.outputs.date }}
        run: |
          set -euo pipefail
          git config user.email "ccir-pipeline@ccir.io"
          git config user.name  "CCIR Pipeline"
          git add src/data/rates_daily.csv src/data/rates_shadow.csv src/data/rates_daily_prev.csv src/data/indices_history.csv src/data/meta.json src/data/vast_basis.csv src/data/committed_mi.csv
          # public/data/listings_history_*.csv only exists once the upstream
          # pipeline starts emitting these files; -A on a missing dir is fine.
          if [ -d public/data ]; then
            git add -A public/data
          fi
          if git diff --cached --quiet; then
            echo "no changes to commit — site already at $DATE"
            exit 0
          fi
          git commit -m "data: refresh snapshot to $DATE"
          git push origin main
